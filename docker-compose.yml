services:

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: collabeditor
      POSTGRES_USER: collabeditor
      POSTGRES_PASSWORD: collabeditor
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "collabeditor", "-d", "collabeditor"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      APP_DB_URL: ${APP_DB_URL}
      APP_DB_USERNAME: ${APP_DB_USERNAME}
      APP_DB_PASSWORD: ${APP_DB_PASSWORD}
      APP_REDIS_HOST: ${APP_REDIS_HOST}
      APP_REDIS_PORT: ${APP_REDIS_PORT}
      APP_JWT_SECRET: ${APP_JWT_SECRET}
      # docker-java auto-discovers the socket via DOCKER_HOST
      DOCKER_HOST: unix:///var/run/docker.sock
    volumes:
      - ${DOCKER_SOCKET_PATH:-/var/run/docker.sock}:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

volumes:
  postgres_data:
