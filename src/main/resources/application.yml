spring:
  datasource:
    url: ${APP_DB_URL:jdbc:postgresql://localhost:5432/collabeditor}
    username: ${APP_DB_USERNAME:collabeditor}
    password: ${APP_DB_PASSWORD:collabeditor}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  data:
    redis:
      host: ${APP_REDIS_HOST:localhost}
      port: ${APP_REDIS_PORT:6379}

  flyway:
    locations: classpath:db/migration
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

app:
  security:
    jwt-secret: ${APP_JWT_SECRET:}
    jwt-issuer: collaborative-code-editor
    access-token-ttl: PT15M
    refresh-token-ttl: P30D
    refresh-cookie-name: ccd_refresh_token
    refresh-cookie-path: /api/auth
    refresh-cookie-same-site: Strict
  session:
    participant-cap: 12
    cleanup-fixed-delay: PT5M
  collaboration:
    cursor-throttle-ms: 75
    redis:
      key-prefix: collab
      lock-ttl-ms: 5000
      session-ttl-seconds: 1800
  execution:
    cooldown-seconds: 5
    timeout-seconds: 10
    worker-count: 2
    queue-capacity: 8
    python-image: python:3.12-slim
    java-image: eclipse-temurin:17-jdk-jammy
    max-memory-bytes: 268435456
    nano-cpus: 500000000
    workspace-tmpfs-bytes: 67108864
    tmp-tmpfs-bytes: 33554432
    non-root-user: "65534:65534"
