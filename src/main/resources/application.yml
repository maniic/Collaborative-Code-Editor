spring:
  datasource:
    url: ${APP_DB_URL:jdbc:postgresql://localhost:5432/collabeditor}
    username: ${APP_DB_USERNAME:collabeditor}
    password: ${APP_DB_PASSWORD:collabeditor}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  flyway:
    locations: classpath:db/migration
    enabled: true

app:
  security:
    jwt-secret: ${APP_JWT_SECRET:}
    jwt-issuer: collaborative-code-editor
    access-token-ttl: PT15M
    refresh-token-ttl: P30D
    refresh-cookie-name: ccd_refresh_token
    refresh-cookie-path: /api/auth
    refresh-cookie-same-site: Strict
  session:
    participant-cap: 12
    cleanup-fixed-delay: PT5M
  collaboration:
    cursor-throttle-ms: 75
