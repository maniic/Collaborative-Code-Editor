spring:
  datasource:
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  data:
    redis:
      host: ${APP_REDIS_HOST:localhost}
      port: ${APP_REDIS_PORT:6379}

  flyway:
    locations: classpath:db/migration
    enabled: true

app:
  security:
    jwt-secret: test-jwt-secret-must-be-at-least-32-bytes-long!!
    jwt-issuer: collaborative-code-editor
    access-token-ttl: PT15M
    refresh-token-ttl: P30D
    refresh-cookie-name: ccd_refresh_token
    refresh-cookie-path: /api/auth
    refresh-cookie-same-site: Strict
  execution:
    cooldown-seconds: 5
    timeout-seconds: 10
    worker-count: 2
    queue-capacity: 8
    python-image: python:3.12-slim
    java-image: eclipse-temurin:17-jdk-jammy
    max-memory-bytes: 268435456
    nano-cpus: 500000000
    workspace-tmpfs-bytes: 67108864
    tmp-tmpfs-bytes: 33554432
    non-root-user: "65534:65534"
