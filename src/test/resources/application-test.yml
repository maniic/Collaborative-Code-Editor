spring:
  datasource:
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  data:
    redis:
      host: ${APP_REDIS_HOST:localhost}
      port: ${APP_REDIS_PORT:6379}

  flyway:
    locations: classpath:db/migration
    enabled: true

app:
  security:
    jwt-secret: test-jwt-secret-must-be-at-least-32-bytes-long!!
    jwt-issuer: collaborative-code-editor
    access-token-ttl: PT15M
    refresh-token-ttl: P30D
    refresh-cookie-name: ccd_refresh_token
    refresh-cookie-path: /api/auth
    refresh-cookie-same-site: Strict
